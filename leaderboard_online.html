<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RANKING (LOCAL)</title>
    <style>
        body { font-family: 'Impact', sans-serif; background: transparent; color: white; margin: 0; padding: 20px; }
        .header { font-size: 24px; color: #4ade80; border-bottom: 2px solid #4ade80; margin-bottom: 10px; width: 400px; }
        .rank-row { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; width: 400px; display: flex; justify-content: space-between; font-size: 30px; border-right: 5px solid #4ade80; }
        .pts { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="header">ONLINE RANKING</div>
    <div class="rank-row">
        <span>1. noppogi</span>
        <span id="pts-display" class="pts">0 枚</span>
    </div>

    <script>
        // ★ points.txt がある場所を指定してください
        const FILE_PATH = "points.txt"; 

        function updatePoints() {
            // キャッシュを防ぐために後ろに時間を付け足してファイルを読み込む
            fetch(FILE_PATH + "?t=" + new Date().getTime())
                .then(response => response.text())
                .then(data => {
                    const pts = parseInt(data.trim());
                    if (!isNaN(pts)) {
                        document.getElementById('pts-display').innerText = pts.toLocaleString() + " 枚";
                    }
                })
                .catch(err => console.log("ファイル読み込み待ち..."));
        }

        // 0.5秒ごとにファイルを読みに行く（超高速更新）
        setInterval(updatePoints, 500);
    </script>
</body>
</html>
