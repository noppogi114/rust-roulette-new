<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        .u-p { position: absolute; top: 76.5%; left: 14.5%; width: 20%; color: #ffffff; font-size: 2.3vw; font-weight: bold; pointer-events: none; }
        .s-t { position: absolute; top: 91.5%; left: 58.5%; color: #ff0000; font-size: 1.8vw; font-weight: bold; pointer-events: none; }

        /* 番号選択：位置をカードに合わせるため調整 */
        .number-selector { position: absolute; top: 21%; left: 8.5%; width: 83%; height: 35%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        /* テスト用に背景色をつけています。位置が合ったら background: transparent にしてください */
        .num-div { width: 18%; height: 90%; cursor: pointer; border-radius: 15px; transition: 0.2s; position: relative; background: rgba(255, 0, 0, 0.2); }
        .num-div.selected { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px 10px #ffffff; border: 2px solid #ffffff; }
        
        /* BETボタン：位置を画像に合わせる */
        .final-bet-div { position: absolute; top: 56%; left: 44.5%; width: 11%; height: 24%; cursor: pointer; z-index: 110; background: rgba(255, 0, 0, 0.3); }
        
        .input-amount { position: absolute; top: 62.5%; left: 5.0%; width: 24.0%; height: 4.5%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 2.5vw; text-align: right; padding-right: 5%; font-weight: bold; z-index: 110; }
        .bet-label { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 1.2vw; font-weight: bold; text-shadow: 2px 2px 2px #000; pointer-events: none; }
        #betPopup { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 20px 40px; border-radius: 15px; font-size: 2.8vw; font-weight: bold; z-index: 999; display: none; text-shadow: 2px 2px 4px #000; border: 4px solid #ffd700; color: #ffd700; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="p" class="u-p">0</div>
        <div id="status-text" class="s-t">受付終了</div>
        <div class="number-selector">
            <div class="num-div" onclick="selectNumber('1', this)"><div id="bet-1" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('3', this)"><div id="bet-3" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('5', this)"><div id="bet-5" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('10', this)"><div id="bet-10" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('20', this)"><div id="bet-20" class="bet-label"></div></div>
        </div>
        <div class="final-bet-div" onclick="executeBet()"></div>
        <input type="number" class="input-amount" id="betAmount" value="100">
        <div id="betPopup"></div>
    </div>
    <script>
        const ws = new WebSocket("wss://sombre-ellison-overdelicately.ngrok-free.dev/streamerbot");
        let selectedNum = "", isBettingOpen = false, popupTimer = null, betRecords = {};

        ws.onopen = () => { 
            console.log("WS CONNECTED");
            ws.send(JSON.stringify({ "request": "Subscribe", "id": "sub", "events": { "General": ["Custom"] } }));
            ws.send(JSON.stringify({ "request": "DoAction", "id": "init", "action": { "name": "SEND_USER_POINTS" } }));
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            const d = res.data || res;
            if (d.p !== undefined) document.getElementById('p').innerText = Number(d.p).toLocaleString();
            if (d.is_open !== undefined) {
                isBettingOpen = (d.is_open === true || d.is_open === 1);
                const statusEl = document.getElementById('status-text');
                statusEl.innerText = isBettingOpen ? "受付中" : "受付終了";
                statusEl.style.color = isBettingOpen ? "#00ff00" : "#ff0000";
                if (!isBettingOpen) resetBets();
            }
            if (d.poggi_msg !== undefined) showPopup(d.poggi_msg, 6000);
        };

        function selectNumber(num, element) {
            if(!isBettingOpen) return;
            console.log("NUM SELECTED:", num);
            selectedNum = num;
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
        }

        function executeBet() {
            console.log("BET CLICKED! Open:", isBettingOpen, "Target:", selectedNum);
            if(!isBettingOpen || !selectedNum) return;
            const amount = parseInt(document.getElementById('betAmount').value);
            const currentTotal = parseInt(document.getElementById('p').innerText.replace(/,/g, ""));
            if (amount > currentTotal) { showPopup("ポイント不足", 2000); return; }

            ws.send(JSON.stringify({
                "request": "DoAction",
                "action": { "name": "BET KAKE" },
                "args": { "betTarget": String(selectedNum), "betAmount": String(amount) }
            }));

            let msg = selectedNum + "番に " + amount + " 賭けました";
            if (betRecords[selectedNum]) msg = selectedNum + "番を " + amount + " に上書きしました";
            betRecords[selectedNum] = amount;
            document.getElementById('bet-' + selectedNum).innerText = amount + " jobo";
            showPopup(msg, 2500);
        }

        function resetBets() {
            betRecords = {};
            document.querySelectorAll('.bet-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            selectedNum = "";
        }

        function showPopup(text, duration) {
            const p = document.getElementById('betPopup');
            if(popupTimer) clearTimeout(popupTimer);
            p.innerText = text; p.style.display = 'block';
            popupTimer = setTimeout(() => { p.style.display = 'none'; }, duration);
        }
    </script>
</body>
</html>
