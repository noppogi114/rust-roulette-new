<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        .user-name-display { position: absolute; top: 71.0%; left: 14.5%; width: 20%; color: #ffcc00; font-size: 1.8vw; font-weight: bold; }
        .points-display { position: absolute; top: 76.5%; left: 14.5%; width: 20%; color: #ffffff; font-size: 2.3vw; font-weight: bold; }
        .status-display { position: absolute; top: 91.0%; left: 51.0%; width: 30%; color: #ef4444; font-size: 2.2vw; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="u_name" class="user-name-display">---</div>
        <div id="u_points" class="points-display">0</div>
        <div id="u_status" class="status-display">接続中...</div>
    </div>
    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL + "/streamerbot");
            ws.onopen = () => { 
                console.log("★ 接続完了 ★");
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "P_SUB", "events": { "Raw": ["Action"] } }));
                setTimeout(() => {
                    ws.send(JSON.stringify({ "request": "DoAction", "id": "P_INIT", "action": { "name": "SEND_USER_POINTS" } }));
                }, 500);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // 生データ（pointsが含まれているか）を厳格にチェック
                if (data.points !== undefined) {
                    console.log("🎯 生データ受信成功！", data);
                    document.getElementById('u_name').innerText = data.name;
                    document.getElementById('u_points').innerText = Number(data.points).toLocaleString();
                    document.getElementById('u_status').innerText = "受付終了";
                } else {
                    console.log("無視:", data);
                }
            };
            ws.onclose = () => { setTimeout(connect, 3000); };
        }
        connect();
    </script>
</body>
</html>
