<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        
        /* ユーザー名（非表示） */
        .u-n { display: none; position: absolute; top: 71.0%; left: 14.5%; width: 20%; color: #ffcc00; font-size: 1.8vw; font-weight: bold; }
        
        /* 所持ポイント（id="p" を維持） */
        .u-p { position: absolute; top: 76.5%; left: 14.5%; width: 20%; color: #ffffff; font-size: 2.3vw; font-weight: bold; }

        /* ステータス（右下） */
        .s-t { position: absolute; top: 91.5%; left: 58.5%; color: #ff0000; font-size: 1.8vw; font-weight: bold; }

        /* BET用透明ボタン設定 */
        .number-selector { position: absolute; top: 22.2%; left: 15.5%; width: 69.0%; height: 32.0%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .num-div { width: 16%; height: 95%; cursor: pointer; border-radius: 15px; transition: 0.2s; position: relative; }
        .num-div.selected { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px 10px #ffffff; border: 2px solid #ffffff; }
        .final-bet-div { position: absolute; top: 55.5%; left: 44.5%; width: 11.5%; height: 25.0%; cursor: pointer; z-index: 110; }
        .input-amount { position: absolute; top: 62.5%; left: 5.0%; width: 24.0%; height: 4.5%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 2.5vw; text-align: right; padding-right: 5%; font-weight: bold; z-index: 110; }
        
        /* 各番号のBET額ラベル */
        .bet-label { position: absolute; bottom: -25px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 1.2vw; font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        /* 通知ポップアップ */
        #betPopup { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 20px 40px; border-radius: 15px; font-size: 2.8vw; font-weight: bold; z-index: 999; display: none; text-shadow: 2px 2px 4px #000; border: 4px solid #ffd700; color: #ffd700; border: 4px solid #ffd700; }
        .pop-win { color: #fff100 !important; border-color: #fff100 !important; box-shadow: 0 0 60px #ffcc00 !important; }
        .pop-lose { color: #ff4444 !important; border-color: #ff4444 !important; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="n" class="u-n">---</div>
        <div id="p" class="u-p">0</div>
        <div id="status-text" class="s-t">受付終了</div>

        <div class="number-selector">
            <div class="num-div" onclick="selectNumber('1', this)"><div id="bet-1" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('3', this)"><div id="bet-3" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('5', this)"><div id="bet-5" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('10', this)"><div id="bet-10" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('20', this)"><div id="bet-20" class="bet-label"></div></div>
        </div>
        <div class="final-bet-div" onclick="executeBet()"></div>
        <input type="number" class="input-amount" id="betAmount" value="100">
        <div id="betPopup"></div>
    </div>

    <script>
        const ws = new WebSocket("wss://sombre-ellison-overdelicately.ngrok-free.dev/streamerbot");
        let selectedNum = "";
        let isBettingOpen = false;
        let popupTimer = null;

        ws.onopen = () => { 
            console.log("CONNECTED");
            ws.send(JSON.stringify({
                "request": "Subscribe",
                "id": "subscribe_all",
                "events": { "General": ["Custom"] }
            }));
            ws.send(JSON.stringify({ "request": "DoAction", "id": "init", "action": { "name": "SEND_TEST" } }));
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.data) {
                const d = res.data;
                // ポイント反映 (id="p" に書き込む)
                if (d.p !== undefined) {
                    document.getElementById('p').innerText = Number(d.p).toLocaleString();
                }

                // ステータス反映
                if (d.is_open !== undefined) {
                    isBettingOpen = (d.is_open === true || d.is_open === 1);
                    const statusEl = document.getElementById('status-text');
                    if (isBettingOpen) {
                        statusEl.innerText = "受付中";
                        statusEl.style.color = "#00ff00";
                    } else {
                        statusEl.innerText = "受付終了";
                        statusEl.style.color = "#ff0000";
                        resetBetLabels(); // 終了時に賭け額表示を消す
                    }
                }

                // 当選などのメッセージ
                if (d.poggi_msg !== undefined) {
                    showPopup(d.poggi_msg, d.poggi_msg.includes("当選") ? "pop-win" : "pop-lose", 6000);
                }
            }
        };

        function selectNumber(num, element) {
            if(!isBettingOpen) return;
            selectedNum = num;
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
        }

        function executeBet() {
            if(!isBettingOpen || !selectedNum) return;
            const amount = document.getElementById('betAmount').value;
            const currentTotal = parseInt(document.getElementById('p').innerText.replace(/,/g, ""));
            
            if (parseInt(amount) > currentTotal) {
                showPopup("ポイント不足", "pop-lose", 2000);
                return;
            }

            ws.send(JSON.stringify({
                "request": "DoAction",
                "action": { "name": "BET KAKE" },
                "args": { "betTarget": String(selectedNum), "betAmount": String(amount) }
            }));
            
            // 番号の下に賭け額を表示
            document.getElementById('bet-' + selectedNum).innerText = amount + " jobo";
            showPopup(selectedNum + "番に " + amount + " 賭けました", "", 2000);
        }

        function resetBetLabels() {
            document.querySelectorAll('.bet-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            selectedNum = "";
        }

        function showPopup(text, className, duration) {
            const p = document.getElementById('betPopup');
            if(popupTimer) clearTimeout(popupTimer);
            p.innerText = text;
            p.className = className;
            p.style.display = 'block';
            popupTimer = setTimeout(() => { p.style.display = 'none'; }, duration);
        }
    </script>
</body>
</html>
