<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        .number-selector { position: absolute; top: 22.2%; left: 15.5%; width: 69.0%; height: 32.0%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .num-div { width: 16%; height: 95%; cursor: pointer; border-radius: 15px; transition: 0.2s; }
        .num-div.selected { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px 10px #ffffff; border: 2px solid #ffffff; }
        .final-bet-div { position: absolute; top: 55.5%; left: 44.5%; width: 11.5%; height: 25.0%; cursor: pointer; z-index: 110; }
        .input-amount { position: absolute; top: 62.5%; left: 5%; width: 24.0%; height: 4.5%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 2.5vw; text-align: right; padding-right: 5%; font-weight: bold; z-index: 110; }
        .points-display { position: absolute; top: 76.5%; left: 14.5%; width: 20%; height: 6%; display: flex; align-items: center; color: #ffffff; font-size: 2.3vw; font-weight: bold; }
        .status-display { position: absolute; top: 91.0%; left: 51.0%; width: 30%; height: 6%; display: flex; align-items: center; color: #ef4444; font-size: 2.2vw; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #betPopup { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 20px 40px; border-radius: 15px; font-size: 2.8vw; font-weight: bold; z-index: 999; display: none; text-shadow: 2px 2px 4px #000; white-space: nowrap; pointer-events: none; border: 4px solid #ffd700; color: #ffd700; }
        .pop-win { color: #fff100 !important; border-color: #fff100 !important; box-shadow: 0 0 60px #ffcc00 !important; }
        .pop-lose { color: #ff4444 !important; border-color: #ff4444 !important; }
        #debugInfo { position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.8); padding: 5px; z-index: 9999; border: 1px solid lime; }
    </style>
</head>
<body>
    <div id="debugInfo">DEBUG: 待機中...</div>
    <div class="main-container">
        <div class="number-selector">
            <div class="num-div" onclick="selectNumber('1', this)"></div>
            <div class="num-div" onclick="selectNumber('3', this)"></div>
            <div class="num-div" onclick="selectNumber('5', this)"></div>
            <div class="num-div" onclick="selectNumber('10', this)"></div>
            <div class="num-div" onclick="selectNumber('20', this)"></div>
        </div>
        <div class="final-bet-div" onclick="executeBet()"></div>
        <input type="number" class="input-amount" id="betAmount" value="100">
        <div class="points-display" id="userPoints">0</div>
        <div class="status-display" id="betStatus">接続中...</div>
        <div id="betPopup"></div>
    </div>

    <script>
        // ★★★ ngrokのURLを最新のものに書き換えてください ★★★
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 

        let ws;
        let selectedNum = "";
        let isBettingOpen = false;
        let hasAlreadyBetted = false;
        let lastWinnerData = ""; 
        let lastBetAmount = 0;
        let popupTimer = null;

        function connect() {
            // リスナー用なので、ポギーさんのPC（ngrok）の /streamerbot 窓口へ接続
            ws = new WebSocket("wss://" + NGROK_URL + "/streamerbot");
            ws.onopen = () => { 
                console.log("WS Connected"); 
                document.getElementById('debugInfo').innerText = "ONLINE: 接続成功";
            };
            ws.onclose = () => { 
                document.getElementById('debugInfo').innerText = "OFFLINE: 再接続中...";
                setTimeout(connect, 3000); 
            };
        }
        connect();

        function selectNumber(num, element) {
            if(!isBettingOpen) return;
            selectedNum = num;
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
        }

        function showPopup(text, className, duration) {
            const p = document.getElementById('betPopup');
            if(popupTimer) clearTimeout(popupTimer);
            p.innerText = text;
            p.className = className;
            p.style.display = 'block';
            popupTimer = setTimeout(() => {
                p.style.display = 'none';
                popupTimer = null;
            }, duration);
        }

        function executeBet() {
            const amountInput = document.getElementById('betAmount');
            const amount = parseInt(amountInput.value);
            const currentTotal = parseInt(document.getElementById('userPoints').innerText.replace(/,/g, ""));

            if(!isBettingOpen || !selectedNum) return;

            if (amount > currentTotal && !hasAlreadyBetted) {
                alert("ポイントが足りません！");
                return;
            }

            lastBetAmount = amount;
            const msg = hasAlreadyBetted ? 
                "noppogi が " + selectedNum + "番に上書きしました！" : 
                "noppogi が " + selectedNum + "番に " + amount.toLocaleString() + " 賭けました！";
            
            showPopup(msg, "", 3000);

            if(ws && ws.readyState === 1) {
                ws.send(JSON.stringify({
                    "request": "DoAction",
                    "action": { "name": "BET KAKE" },
                    "args": { "betTarget": String(selectedNum), "betAmount": String(amount) },
                    "id": "POGGY_" + Date.now()
                }));
                hasAlreadyBetted = true;
            }
        }

        // --- 物理監視（ポーリング）セクション ---
        function updateLoop() {
            const t = new Date().getTime();
            
            // ファイルパスは roulette.html と同じフォルダにある前提
            const files = [
                { id: 'userPoints', file: 'points.txt', isPoint: true },
                { id: 'betStatus', file: 'bet_status.txt', isStatus: true },
                { id: 'winner', file: 'winner.txt', isWinner: true }
            ];

            files.forEach(item => {
                const xhr = new XMLHttpRequest();
                // リスナーはブラウザから直接ローカルファイルを見れないため、
                // 公開場所（GitHub Pages等）にあるファイルを読みに行く
                xhr.open("GET", item.file + "?v=" + t, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        const txt = xhr.responseText.trim();
                        
                        if (item.isPoint) {
                            if(txt !== "" && !isNaN(txt.replace(/,/g, ""))) {
                                document.getElementById('userPoints').innerText = Number(txt.replace(/,/g, "")).toLocaleString();
                            }
                        } else if (item.isStatus) {
                            const el = document.getElementById('betStatus');
                            if (txt.indexOf("1") !== -1) {
                                isBettingOpen = true;
                                el.innerText = "受付開始";
                                el.style.color = "#22c55e";
                            } else {
                                isBettingOpen = false;
                                hasAlreadyBetted = false;
                                el.innerText = "受付終了";
                                el.style.color = "#ef4444";
                            }
                        } else if (item.isWinner) {
                            if (txt !== "" && txt !== lastWinnerData) {
                                lastWinnerData = txt;
                                if (txt.includes("noppogi")) {
                                    const payout = txt.split(",")[1];
                                    showPopup("🎉 WIN!! +" + Number(payout).toLocaleString(), "pop-win", 6000);
                                } else if (txt === "lose") {
                                    const loseAmt = lastBetAmount > 0 ? " -" + lastBetAmount.toLocaleString() : "";
                                    showPopup("💀 LOSE..." + loseAmt, "pop-lose", 6000);
                                }
                                lastBetAmount = 0;
                            } else if (txt === "" && lastWinnerData !== "") {
                                lastWinnerData = "";
                            }
                        }
                    }
                };
                xhr.send();
            });
        }

        setInterval(updateLoop, 500);
        updateLoop();
    </script>
</body>
</html>
