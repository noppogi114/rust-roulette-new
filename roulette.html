<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        .u-n { position: absolute; top: 71.0%; left: 14.5%; width: 20%; color: #ffcc00; font-size: 1.8vw; font-weight: bold; }
        .u-p { position: absolute; top: 76.5%; left: 14.5%; width: 20%; color: #ffffff; font-size: 2.3vw; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="n" class="u-n">---</div>
        <div id="p" class="u-p">0</div>
    </div>
    <script>
        const ws = new WebSocket("wss://sombre-ellison-overdelicately.ngrok-free.dev/streamerbot");
        
        ws.onopen = () => { 
            console.log("CONNECTED");
            // ボットにアクション実行を依頼
            ws.send(JSON.stringify({ "request": "DoAction", "id": "init", "action": { "name": "SEND_USER_POINTS" } }));
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            console.log("RECEIVED:", d);
            
            // ボットの標準報告(status:ok)を無視し、生データ(p)が届いた時だけ処理
            if (d.p !== undefined) {
                document.getElementById('n').innerText = d.n;
                document.getElementById('p').innerText = Number(d.p).toLocaleString();
            }
        };
    </script>
</body>
</html>
