<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE (HYPER SYNC)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .main-container { position: relative; width: 100vw; height: 100vh; background-image: url('main_bg.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
        
        /* ポギーさんの「正確な位置」数値を維持 */
        .number-selector { position: absolute; top: 22.2%; left: 15.5%; width: 69.0%; height: 32.0%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .num-div { width: 16%; height: 95%; cursor: pointer; border-radius: 15px; transition: 0.2s; }
        .num-div.selected { background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px 10px #ffffff; border: 2px solid #ffffff; }
        
        .final-bet-div { position: absolute; top: 55.5%; left: 44.5%; width: 11.5%; height: 25.0%; cursor: pointer; z-index: 110; }
        .input-amount { position: absolute; top: 62.5%; left: 5%; width: 24.0%; height: 4.5%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 2.5vw; text-align: right; padding-right: 5%; font-weight: bold; z-index: 110; }
        .points-display { position: absolute; top: 76.5%; left: 14.5%; width: 20%; height: 6%; display: flex; align-items: center; color: #ffffff; font-size: 2.3vw; font-weight: bold; }
        .status-display { position: absolute; top: 91.0%; left: 51.0%; width: 30%; height: 6%; display: flex; align-items: center; color: #ef4444; font-size: 2.2vw; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        .bet-label { position: absolute; bottom: -25px; left: 0; width: 100%; text-align: center; color: #fff; font-size: 1.2vw; font-weight: bold; text-shadow: 2px 2px 2px #000; pointer-events: none; }
        
        #betPopup { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); padding: 20px 40px; border-radius: 15px; font-size: 2.8vw; font-weight: bold; z-index: 999; display: none; text-shadow: 2px 2px 4px #000; white-space: nowrap; pointer-events: none; border: 4px solid #ffd700; color: #ffd700; }
        #debugInfo { position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.8); padding: 5px; z-index: 9999; border: 1px solid lime; }
    </style>
</head>
<body>
    <div id="debugInfo">WS: 待機中...</div>
    <div class="main-container">
        <div class="number-selector">
            <div class="num-div" onclick="selectNumber('1', this)"><div id="bet-1" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('3', this)"><div id="bet-3" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('5', this)"><div id="bet-5" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('10', this)"><div id="bet-10" class="bet-label"></div></div>
            <div class="num-div" onclick="selectNumber('20', this)"><div id="bet-20" class="bet-label"></div></div>
        </div>
        <div class="final-bet-div" onclick="executeBet()"></div>
        <input type="number" class="input-amount" id="betAmount" value="100">
        <div class="points-display" id="userPoints">0</div>
        <div class="status-display" id="betStatus">接続待機中</div>
        <div id="betPopup"></div>
    </div>
    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws, selectedNum = "", isBettingOpen = false, popupTimer = null, betRecords = {};

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL + "/streamerbot");
            ws.onopen = () => { 
                console.log("★★★ WS CONNECTED ★★★"); 
                document.getElementById('debugInfo').innerText = "ONLINE: 接続中";
                // 購読と初期データ取得
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "sub", "events": { "General": ["Custom"] } }));
                ws.send(JSON.stringify({ "request": "DoAction", "id": "init", "action": { "name": "SEND_USER_POINTS" } }));
            };
            ws.onmessage = (event) => {
                const res = JSON.parse(event.data);
                // 【修正】 data階層があってもなくても読み取れるように統合
                const d = res.data || res;

                // ポイント反映
                if (d.p !== undefined) {
                    document.getElementById('userPoints').innerText = Number(d.p).toLocaleString();
                }

                // 受付ステータス反映 (ボット側の is_betting_open または is_open に対応)
                const openStatus = d.is_betting_open !== undefined ? d.is_betting_open : d.is_open;
                if (openStatus !== undefined) {
                    const el = document.getElementById('betStatus');
                    isBettingOpen = (openStatus === true || openStatus === 1 || openStatus === "1");
                    el.innerText = isBettingOpen ? "受付開始" : "受付終了";
                    el.style.color = isBettingOpen ? "#22c55e" : "#ef4444";
                    if (!isBettingOpen) resetBets();
                }

                if (d.poggi_msg !== undefined) showPopup(d.poggi_msg, 6000);
            };
            ws.onclose = () => { setTimeout(connect, 3000); };
        }
        connect();

        function selectNumber(num, element) {
            if(!isBettingOpen) return;
            selectedNum = num;
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
        }

        function executeBet() {
            if(!isBettingOpen || !selectedNum) return;
            const amount = parseInt(document.getElementById('betAmount').value);
            const currentTotal = parseInt(document.getElementById('userPoints').innerText.replace(/,/g, ""));
            
            if (amount > currentTotal) { showPopup("ポイント不足", 2000); return; }

            ws.send(JSON.stringify({
                "request": "DoAction",
                "id": "bet_" + Date.now(),
                "action": { "name": "BET KAKE" },
                "args": { "betTarget": String(selectedNum), "betAmount": String(amount) }
            }));

            let msg = selectedNum + "番に " + amount + " 賭けました";
            if (betRecords[selectedNum]) msg = selectedNum + "番を " + amount + " に上書きしました";
            betRecords[selectedNum] = amount;
            document.getElementById('bet-' + selectedNum).innerText = amount + " jobo";
            showPopup(msg, 2500);
        }

        function resetBets() {
            betRecords = {};
            document.querySelectorAll('.bet-label').forEach(el => el.innerText = "");
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            selectedNum = "";
        }

        function showPopup(text, duration) {
            const p = document.getElementById('betPopup');
            if(popupTimer) clearTimeout(popupTimer);
            p.innerText = text; p.style.display = 'block';
            popupTimer = setTimeout(() => { p.style.display = 'none'; }, duration);
        }
    </script>
</body>
</html>
