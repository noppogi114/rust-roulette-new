<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .main-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            background-image: url('main_bg.png'); 
            background-size: 100% 100%; 
            background-position: center; 
            background-repeat: no-repeat; 
        }
        /* ユーザー名表示位置（display: none で非表示に設定） */
        .u-n { 
            display: none; /* ← ここを追加しました */
            position: absolute; 
            top: 71.0%; 
            left: 14.5%; 
            width: 20%; 
            color: #ffcc00; 
            font-size: 1.8vw; 
            font-weight: bold; 
        }
        /* 所持ポイント表示位置 */
        .u-p { 
            position: absolute; 
            top: 76.5%; 
            left: 14.5%; 
            width: 20%; 
            color: #ffffff; 
            font-size: 2.3vw; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="n" class="u-n">---</div>
        <div id="p" class="u-p">0</div>
    </div>

    <script>
        const ws = new WebSocket("wss://sombre-ellison-overdelicately.ngrok-free.dev/streamerbot");

        ws.onopen = () => { 
            console.log("CONNECTED");
            ws.send(JSON.stringify({
                "request": "Subscribe",
                "id": "subscribe_all",
                "events": { "General": ["Custom"] }
            }));
            ws.send(JSON.stringify({ 
                "request": "DoAction", 
                "id": "init_request", 
                "action": { "name": "SEND_TEST" } 
            }));
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.data && res.data.p !== undefined) {
                document.getElementById('n').innerText = res.data.n;
                document.getElementById('p').innerText = Number(res.data.p).toLocaleString();
            }
        };
    </script>
</body>
</html>
