<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POGGI RUST ROULETTE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        .main-container { position: relative; width: 100vw; height: 100vh; max-height: 56.25vw; background-image: url('main_bg.png?v=3'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; display: block; }
        @media (min-aspect-ratio: 16/9) { .main-container { max-height: 100vh; } }
        .user-badge { position: absolute; top: 2.2%; left: 2.2%; background: rgba(0, 0, 0, 0.7); color: #4ade80; padding: 0.8% 2%; border-radius: 30px; font-size: 1.2vw; font-weight: bold; border: 1px solid #4ade80; z-index: 200; display: flex; align-items: center; gap: 10px; }
        .number-selector { position: absolute; top: 22.2%; left: 14.5%; width: 71.0%; height: 32.0%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .num-div { width: 16%; height: 95%; cursor: pointer; border-radius: 15px; transition: 0.2s; position: relative; }
        .num-div.selected { background: rgba(255, 255, 255, 0.3); box-shadow: 0 0 20px 5px #ffffff; border: 2px solid #ffffff; }
        .final-bet-div { position: absolute; top: 56.5%; left: 44.5%; width: 11.0%; height: 25.0%; cursor: pointer; z-index: 110; }
        .input-amount { position: absolute; top: 62.8%; left: 14.5%; width: 28.0%; height: 6.0%; background: transparent; border: none; outline: none; color: #ffffff; font-size: 2.5vw; text-align: center; font-weight: bold; z-index: 110; }
        .points-display { position: absolute; top: 74.8%; left: 14.5%; width: 28.0%; height: 6.0%; display: flex; justify-content: center; align-items: center; color: #ffffff; font-size: 2.5vw; font-weight: bold; }
        .refresh-trigger { position: absolute; top: 74.5%; left: 37.0%; width: 5.5%; height: 7.0%; cursor: pointer; z-index: 150; }
        .status-display { position: absolute; top: 92.5%; left: 55.0%; width: 35.0%; height: 6.0%; display: flex; align-items: center; justify-content: center; font-size: 2.2vw; font-weight: bold; color: #ffffff; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="user-badge">● PLAYER: <span id="displayNickName">----</span></div>
        <div class="number-selector">
            <div class="num-div" onclick="selectNumber('1', this)"></div>
            <div class="num-div" onclick="selectNumber('3', this)"></div>
            <div class="num-div" onclick="selectNumber('5', this)"></div>
            <div class="num-div" onclick="selectNumber('10', this)"></div>
            <div class="num-div" onclick="selectNumber('20', this)"></div>
        </div>
        <div class="final-bet-div" onclick="executeBet()"></div>
        <input type="number" class="input-amount" id="betAmount" value="100">
        <div class="points-display" id="userPoints">0</div>
        <div class="refresh-trigger" onclick="manualRefresh()"></div>
        <div class="status-display" id="betStatus">CONNECTING...</div>
    </div>

    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws, selectedNum = "", isBettingOpen = false, myID = "", myKey = "", myNick = "";

        const urlParams = new URLSearchParams(window.location.search);
        myID = urlParams.get('user') || localStorage.getItem('poggi_user_id');
        myKey = urlParams.get('key') || localStorage.getItem('poggi_user_key');
        myNick = localStorage.getItem('poggi_user_nick') || "Guest";

        window.onload = () => {
            if (urlParams.get('user')) {
                localStorage.setItem('poggi_user_id', myID);
                localStorage.setItem('poggi_user_key', myKey);
            }
            document.getElementById('displayNickName').innerText = myNick;
            connect();
        };

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            ws.onopen = () => {
                document.getElementById('betStatus').innerText = "CONNECTED";
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "sub", "events": { "General": ["Custom"] } }));
                manualRefresh();
            };
            ws.onmessage = (event) => {
                const res = JSON.parse(event.data);
                const d = res.data || res;
                if (d.targetUser === myID) {
                    if (d.p !== undefined) document.getElementById('userPoints').innerText = Number(d.p).toLocaleString();
                }
                if (d.is_open !== undefined) {
                    isBettingOpen = (d.is_open == 1 || d.is_open === true);
                    const el = document.getElementById('betStatus');
                    el.innerText = isBettingOpen ? "受付中" : "受付終了";
                    el.style.color = isBettingOpen ? "#22c55e" : "#ef4444";
                }
            };
            ws.onclose = () => {
                document.getElementById('betStatus').innerText = "RECONNECTING...";
                setTimeout(connect, 3000);
            };
        }

        function manualRefresh() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ "request": "DoAction", "id": "refresh", "action": { "name": "SEND_USER_POINTS" }, "args": { "targetUser": myID } }));
            }
        }

        function selectNumber(num, element) {
            selectedNum = num;
            document.querySelectorAll('.num-div').forEach(d => d.classList.remove('selected'));
            element.classList.add('selected');
        }

        function executeBet() {
            if(!isBettingOpen || !selectedNum) return;
            const amount = document.getElementById('betAmount').value;
            ws.send(JSON.stringify({ "request": "DoAction", "id": "bet", "action": { "name": "BET KAKE" }, "args": { "betTarget": selectedNum, "betAmount": amount, "targetUser": myID, "key": myKey } }));
        }
    </script>
</body>
</html>
