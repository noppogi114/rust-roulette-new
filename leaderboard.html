<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RANKING</title>
    <style>
        body { background-color: transparent; color: white; font-family: sans-serif; padding: 10px; margin: 0; overflow: hidden; }
        
        /* ランキングボード本体 */
        .board { 
            width: 350px; 
            background: rgba(20, 20, 20, 0.95); 
            border: 2px solid #4ade80; 
            border-radius: 10px; 
            padding: 15px; 
            transition: 0.5s; /* 演出用に変化をなめらかに */
            position: relative;
        }

        /* ボーナス発生時の黄金エフェクト */
        .board.bonus-active {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
            transform: scale(1.05);
        }

        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 8px; font-size: 18px; transition: 0.3s; }
        .bonus-active h2 { color: #ffd700; border-bottom-color: #ffd700; }

        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #333; }
        td { padding: 8px 5px; font-size: 15px; }
        .rank { width: 35px; text-align: center; font-weight: bold; color: #ffd700; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; }

        /* ボーナス文字のアニメーション */
        #bonus-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 215, 0, 0.9);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 24px;
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #bonus-alert.show {
            transform: translate(-50%, -50%) scale(1.2);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="board" id="main-board">
        <!-- ボーナス時の飛び出す文字 -->
        <div id="bonus-alert">💰 BONUS +1000pt</div>

        <h2 id="st">🏆 TOP 10 RANKING</h2>
        <table><tbody id="ranking-body"><tr><td colspan="3" style="text-align:center;">接続待機中...</td></tr></tbody></table>
    </div>

    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            
            ws.onopen = () => {
                document.getElementById('st').innerText = "🏆 RANKING (CONNECTED)";
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                
                ws.send(JSON.stringify({
                    "request": "DoAction",
                    "id": "init_ranking",
                    "action": { "name": "GetLeaderboard" }
                }));

                setInterval(() => {
                    if(ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ 
                            "request": "GetGlobalVariable", 
                            "id": "gr", 
                            "variable": "current_leaderboard_json", 
                            "persisted": true 
                        }));
                    }
                }, 10000);
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                let list = null;
                const d = res.data || res;

                // --- ★ボーナス通知の受信処理 ---
                // poggi_msg が届いたときに演出を実行
                if (d.poggi_msg && d.poggi_msg.includes("ボーナス")) {
                    triggerBonusVisual();
                }

                if (res.id === "gr" && res.status === "ok" && res.variables) {
                    const rawVal = res.variables.current_leaderboard_json;
                    if (rawVal) {
                        list = typeof rawVal === 'string' ? JSON.parse(rawVal) : rawVal;
                    }
                } 
                else if (d.type === "leaderboard") {
                    list = d.data;
                }

                if (list && Array.isArray(list)) {
                    updateUI(list);
                }
            };

            ws.onclose = () => {
                document.getElementById('st').innerText = "🏆 RANKING (RECONNECTING...)";
                setTimeout(connect, 3000);
            };
        }

        // --- ★ボーナス視覚演出の関数 ---
        function triggerBonusVisual() {
            const board = document.getElementById('main-board');
            const alert = document.getElementById('bonus-alert');

            board.classList.add('bonus-active');
            alert.classList.add('show');

            // 3秒後にエフェクトを消す
            setTimeout(() => {
                board.classList.remove('bonus-active');
                alert.classList.remove('show');
            }, 3000);
        }

        function updateUI(list) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = "";
            if (list.length === 0) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center;">データがありません</td></tr>';
                return;
            }
            list.forEach((u, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${i+1}</td>
                    <td>${u.name}</td>
                    <td class="points">${Number(u.p).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }

        connect();
    </script>
</body>
</html>
