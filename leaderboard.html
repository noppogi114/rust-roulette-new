<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RANKING</title>
    <style>
        body { background-color: transparent; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .board { width: 350px; background: rgba(20, 20, 20, 0.95); border: 2px solid #4ade80; border-radius: 10px; padding: 15px; }
        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 8px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #333; }
        td { padding: 8px 5px; font-size: 15px; }
        .rank { width: 35px; text-align: center; font-weight: bold; color: #ffd700; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="board">
        <h2>🏆 TOP 10 RANKING</h2>
        <table><tbody id="ranking-body"><tr><td colspan="3" style="text-align:center;">接続中...</td></tr></tbody></table>
    </div>
    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;
        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                // 5秒おきに最新の変数をボットに問い合わせる
                setInterval(() => {
                    ws.send(JSON.stringify({ "request": "GetGlobalVariable", "id": "gr", "variable": "current_leaderboard_json", "persisted": true }));
                }, 5000);
            };
            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                let list = null;

                // 1. 変数の問い合わせに対する返信(value)をチェック
                if (res.id === "gr" && res.status === "ok" && res.value) {
                    list = JSON.parse(res.value);
                } 
                // 2. 放送(broadcast)をチェック
                else if (res.data && res.data.type === "leaderboard") {
                    list = res.data.data;
                }

                if (list) {
                    const body = document.getElementById('ranking-body');
                    body.innerHTML = "";
                    list.forEach((u, i) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td class="rank">${i+1}</td><td>${u.name}</td><td class="points">${u.p.toLocaleString()}</td>`;
                        body.appendChild(tr);
                    });
                }
            };
            ws.onclose = () => setTimeout(connect, 3000);
        }
        connect();
    </script>
</body>
</html>
