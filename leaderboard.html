<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI ROULETTE LEADERBOARD</title>
    <style>
        body { background-color: transparent; color: white; font-family: sans-serif; overflow: hidden; margin: 0; padding: 10px; }
        .board { width: 350px; background: rgba(20, 20, 20, 0.95); border: 2px solid #4ade80; border-radius: 10px; padding: 15px; }
        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 5px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #333; }
        th { text-align: left; color: #aaa; font-size: 12px; padding: 5px; }
        td { padding: 8px 5px; font-size: 14px; }
        .rank { width: 40px; text-align: center; font-weight: bold; color: #ffd700; }
        .name { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="board">
        <h2>🏆 TOP 10 RANKING</h2>
        <table>
            <thead>
                <tr><th>順位</th><th>プレイヤー</th><th style="text-align: right;">ポイント</th></tr>
            </thead>
            <tbody id="ranking-body">
                <tr><td colspan="3" style="text-align:center;">データ取得中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                refresh();
            };

            ws.onmessage = (event) => {
                const res = JSON.parse(event.data);
                // ボットからのデータを解析 (あらゆる階層をチェック)
                const d = res.data || res;
                
                if (d.type === "leaderboard") {
                    const list = d.list || d.data; // 両方のパターンに対応
                    if (list) updateBoard(list);
                }
            };

            ws.onclose = () => setTimeout(connect, 3000);
        }

        function refresh() {
            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ "request": "DoAction", "id": "get_rank", "action": { "name": "GetLeaderboard" } }));
            }
        }

        function updateBoard(list) {
            const body = document.getElementById('ranking-body');
            if (!list || list.length === 0) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center;">参加者がいません</td></tr>';
                return;
            }
            body.innerHTML = "";
            list.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td class="name">${user.name}</td>
                    <td class="points">${Number(user.p).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }

        setInterval(refresh, 10000); // 10秒おきに更新
        connect();
    </script>
</body>
</html>
