<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI ROULETTE LEADERBOARD</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .board { width: 350px; background: rgba(30, 30, 30, 0.95); border: 2px solid #4ade80; border-radius: 10px; padding: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 8px; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #444; }
        th { text-align: left; color: #888; font-size: 12px; padding: 5px; }
        td { padding: 10px 5px; font-size: 15px; }
        .rank { width: 40px; text-align: center; font-weight: bold; color: #ffd700; }
        .name { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #eee; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="board">
        <h2>🏆 TOP 10 RANKING</h2>
        <table>
            <thead>
                <tr><th>位</th><th>プレイヤー</th><th style="text-align: right;">ポイント</th></tr>
            </thead>
            <tbody id="ranking-body">
                <tr><td colspan="3" style="text-align:center; padding: 20px;">接続中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                refresh();
            };

            ws.onmessage = (event) => {
                const res = JSON.parse(event.data);
                console.log("受信データ:", res); // コンソールで中身を確認
                
                // あらゆる階層から type: "leaderboard" を探す
                const findData = (obj) => {
                    if (obj.type === "leaderboard") return obj.list || obj.data;
                    if (obj.data) return findData(obj.data);
                    return null;
                };

                const rankingList = findData(res);
                if (rankingList) {
                    updateBoard(rankingList);
                }
            };

            ws.onclose = () => setTimeout(connect, 3000);
        }

        function refresh() {
            if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ "request": "DoAction", "id": "get_rank", "action": { "name": "GetLeaderboard" } }));
            }
        }

        function updateBoard(list) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = "";
            list.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${index + 1}</td>
                    <td class="name">${user.name || user.Name}</td>
                    <td class="points">${Number(user.p || user.Points).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }

        setInterval(refresh, 10000); // 10秒更新
        connect();
    </script>
</body>
</html>
