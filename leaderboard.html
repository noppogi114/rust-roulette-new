<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RANKING</title>
    <style>
        body { background-color: transparent; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .board { width: 350px; background: rgba(20, 20, 20, 0.95); border: 2px solid #4ade80; border-radius: 10px; padding: 15px; }
        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 8px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        tr { border-bottom: 1px solid #333; }
        td { padding: 8px 5px; font-size: 15px; }
        .rank { width: 35px; text-align: center; font-weight: bold; color: #ffd700; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="board">
        <h2 id="st">🏆 TOP 10 RANKING</h2>
        <table><tbody id="ranking-body"><tr><td colspan="3" style="text-align:center;">接続待機中...</td></tr></tbody></table>
    </div>
    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            
            ws.onopen = () => {
                document.getElementById('st').innerText = "🏆 RANKING (CONNECTED)";
                // WebSocket購読（これが無いとリアルタイム放送が届きません）
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                
                // ページを開いた瞬間に最新ランキングを生成させる
                ws.send(JSON.stringify({
                    "request": "DoAction",
                    "id": "init_ranking",
                    "action": { "name": "GetLeaderboard" }
                }));

                // 定期チェック（F5の代わりのバックアップ）
                // 5秒だと頻繁すぎる場合は10〜30秒でもOKです
                setInterval(() => {
                    if(ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ 
                            "request": "GetGlobalVariable", 
                            "id": "gr", 
                            "variable": "current_leaderboard_json", 
                            "persisted": true 
                        }));
                    }
                }, 10000); // 10秒に1回に調整
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                let list = null;

                // 1. 変数の直接取得 (GetGlobalVariable) に対する処理
                if (res.id === "gr" && res.status === "ok" && res.variables) {
                    const rawVal = res.variables.current_leaderboard_json;
                    if (rawVal) {
                        list = typeof rawVal === 'string' ? JSON.parse(rawVal) : rawVal;
                    }
                } 
                // 2. 放送 (Broadcast) に対する処理（ここがリアルタイム更新の肝）
                // data.type または type どちらでも受け取れるようにガードを強化
                else {
                    const d = res.data || res;
                    if (d.type === "leaderboard") {
                        list = d.data;
                    }
                }

                // リストが存在すれば表示を更新
                if (list && Array.isArray(list)) {
                    updateUI(list);
                }
            };

            ws.onclose = () => {
                document.getElementById('st').innerText = "🏆 RANKING (RECONNECTING...)";
                setTimeout(connect, 3000);
            };
        }

        function updateUI(list) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = "";
            if (list.length === 0) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center;">データがありません</td></tr>';
                return;
            }
            list.forEach((u, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${i+1}</td>
                    <td>${u.name}</td>
                    <td class="points">${Number(u.p).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }

        connect();
    </script>
</body>
</html>
