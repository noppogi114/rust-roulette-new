<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>POGGI RANKING</title>
    <style>
        body { background-color: transparent; color: white; font-family: sans-serif; padding: 10px; margin: 0; overflow: hidden; }
        
        /* ランキングボード本体 */
        .board { 
            width: 350px; 
            background: rgba(20, 20, 20, 0.95); 
            border: 2px solid #4ade80; 
            border-radius: 10px; 
            padding: 15px; 
            transition: 0.5s;
            position: relative;
            margin-top: 40px; /* パトライト用のスペース */
        }

        /* ボーナス発生時の黄金エフェクト */
        .board.bonus-active {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
            transform: scale(1.05);
        }

        /* --- パトライト演出 --- */
        #patrol-light {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 40px;
            background: #440000;
            border-radius: 25px 25px 5px 5px;
            display: none;
            z-index: 110;
        }

        .rotating #patrol-light {
            display: block;
            animation: patrol-glow 0.15s infinite;
        }

        @keyframes patrol-glow {
            0% { background: #ff0000; box-shadow: 0 0 10px #ff0000, 0 0 40px #ff0000; }
            50% { background: #ffaaaa; box-shadow: 0 0 20px #ff0000, 0 0 80px #ff0000; }
            100% { background: #ff0000; box-shadow: 0 0 10px #ff0000, 0 0 40px #ff0000; }
        }

        h2 { margin: 0 0 10px 0; text-align: center; color: #4ade80; border-bottom: 1px solid #4ade80; padding-bottom: 8px; font-size: 18px; transition: 0.3s; }
        .bonus-active h2 { color: #ffd700; border-bottom-color: #ffd700; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        tr { border-bottom: 1px solid #333; }
        td { padding: 8px 5px; font-size: 15px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .rank { width: 35px; text-align: center; font-weight: bold; color: #ffd700; }
        .name { text-align: left; }
        .points { text-align: right; color: #4ade80; font-family: monospace; font-weight: bold; width: 100px; }

        /* ポップアップ通知のアニメーション */
        #bonus-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(45deg, #ffd700, #fff);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 22px; /* 少し文字を調整 */
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }
        #bonus-alert.show {
            transform: translate(-50%, -50%) scale(1.1);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="board" id="main-board">
        <div id="patrol-light"></div>
        <div id="bonus-alert">💰 BONUS!</div>

        <h2 id="st">🏆 TOP 10 RANKING</h2>
        <table><tbody id="ranking-body"><tr><td colspan="3" style="text-align:center;">接続待機中...</td></tr></tbody></table>
    </div>

    <script>
        const NGROK_URL = "sombre-ellison-overdelicately.ngrok-free.dev"; 
        let ws;

        function connect() {
            ws = new WebSocket("wss://" + NGROK_URL);
            
            ws.onopen = () => {
                document.getElementById('st').innerText = "🏆 RANKING (CONNECTED)";
                ws.send(JSON.stringify({ "request": "Subscribe", "id": "ranking", "events": { "General": ["Custom"] } }));
                ws.send(JSON.stringify({ "request": "DoAction", "id": "init_ranking", "action": { "name": "GetLeaderboard" } }));

                setInterval(() => {
                    if(ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ "request": "GetGlobalVariable", "id": "gr", "variable": "current_leaderboard_json", "persisted": true }));
                    }
                }, 10000);
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                const d = res.data || res;

                // --- 演出のトリガー判定 ---
                if (d.poggi_msg) {
                    const msg = d.poggi_msg;
                    const alertElem = document.getElementById('bonus-alert');

                    // 表示するテキストを設定
                    alertElem.innerText = msg.replace("💬 ", "");

                    // 「ボーナス」が含まれる場合のみパトライトを回す
                    if (msg.includes("ボーナス")) {
                        triggerBonusVisual(true);
                    } 
                    // 「Like」や「TwiCa」が含まれる場合はパトライトなしでポップアップ
                    else if (msg.includes("Like") || msg.includes("TwiCa")) {
                        triggerBonusVisual(false);
                    }
                }

                if (res.id === "gr" && res.status === "ok" && res.variables) {
                    const rawVal = res.variables.current_leaderboard_json;
                    if (rawVal) {
                        const list = typeof rawVal === 'string' ? JSON.parse(rawVal) : rawVal;
                        updateUI(list);
                    }
                } 
                else if (d.type === "leaderboard") {
                    updateUI(d.data);
                }
            };

            ws.onclose = () => {
                document.getElementById('st').innerText = "🏆 RANKING (RECONNECTING...)";
                setTimeout(connect, 3000);
            };
        }

        // usePatrol が true の時だけパトライトを起動
        function triggerBonusVisual(usePatrol) {
            const board = document.getElementById('main-board');
            const alert = document.getElementById('bonus-alert');

            if (usePatrol) {
                document.body.classList.add('rotating');
            }
            board.classList.add('bonus-active');
            alert.classList.add('show');

            setTimeout(() => {
                document.body.classList.remove('rotating');
                board.classList.remove('bonus-active');
                alert.classList.remove('show');
            }, 4000);
        }

        function updateUI(list) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = "";
            if (!list || list.length === 0) return;
            list.forEach((u, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rank">${i+1}</td>
                    <td class="name">${u.name}</td>
                    <td class="points">${Number(u.p).toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }
        connect();
    </script>
</body>
</html>
